name: Java Spring Boot CI Pipeline

on:
  push:        # Trigger when code is pushed
    branches:
      - 'murali-testing'   # Matches all branches
  pull_request: # Trigger when PR is opened or updated
    branches:
      - 'murali-testing'   # Matches all branches

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the source code
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2️⃣ Set up Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3️⃣ Cache Maven dependencies to speed up builds
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4️⃣ Install dependencies and package the app
      - name: Build with Maven
        working-directory: enterprise-demo
        run: mvn clean install

      # 5️⃣ Run the Spring Boot application (for testing startup)
      - name: Run Spring Boot App
        run: |
          nohup mvn spring-boot:run &
          sleep 15
          curl --fail http://localhost:8080/api/hello

      # 6️⃣ Archive test reports (optional)
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports
